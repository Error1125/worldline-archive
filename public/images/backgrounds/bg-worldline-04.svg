<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- 抽象世界线网格：透视网格 + 分歧世界线（原创占位背景） -->
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04050c"/>
      <stop offset="1" stop-color="#090d20"/>
    </linearGradient>
    <radialGradient id="core4" cx="0.32" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#7db5ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7db5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow4" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#sky4)"/>
  <rect width="1600" height="900" fill="url(#core4)"/>
  <!-- 透视网格（消失点 512,450） -->
  <g stroke="#7db5ff" stroke-opacity="0.1" stroke-width="1">
    <line x1="512" y1="450" x2="1600" y2="20"/><line x1="512" y1="450" x2="1600" y2="180"/>
    <line x1="512" y1="450" x2="1600" y2="340"/><line x1="512" y1="450" x2="1600" y2="560"/>
    <line x1="512" y1="450" x2="1600" y2="720"/><line x1="512" y1="450" x2="1600" y2="880"/>
    <line x1="512" y1="450" x2="0" y2="20"/><line x1="512" y1="450" x2="0" y2="200"/>
    <line x1="512" y1="450" x2="0" y2="700"/><line x1="512" y1="450" x2="0" y2="880"/>
    <path d="M212 450 A300 118 0 0 0 812 450 A300 118 0 0 0 212 450"/>
    <path d="M-38 450 A550 216 0 0 0 1062 450 A550 216 0 0 0 -38 450"/>
    <path d="M-338 450 A850 334 0 0 0 1362 450 A850 334 0 0 0 -338 450"/>
  </g>
  <!-- 分歧的世界线（辉光层 + 主线） -->
  <g fill="none" stroke-linecap="round">
    <path d="M-40 470 C 360 460, 470 452, 512 450 C 760 440, 1120 300, 1640 180" stroke="#4df0dd" stroke-opacity="0.35" stroke-width="9" filter="url(#glow4)"/>
    <path d="M-40 470 C 360 460, 470 452, 512 450 C 760 440, 1120 300, 1640 180" stroke="#4df0dd" stroke-opacity="0.9" stroke-width="2"/>
    <path d="M-40 470 C 360 460, 470 452, 512 450 C 780 462, 1140 520, 1640 640" stroke="#c08bff" stroke-opacity="0.3" stroke-width="9" filter="url(#glow4)"/>
    <path d="M-40 470 C 360 460, 470 452, 512 450 C 780 462, 1140 520, 1640 640" stroke="#c08bff" stroke-opacity="0.85" stroke-width="2"/>
    <path d="M-40 470 C 360 460, 470 452, 512 450 C 800 448, 1180 430, 1640 410" stroke="#ff9fd6" stroke-opacity="0.22" stroke-width="7" filter="url(#glow4)"/>
    <path d="M-40 470 C 360 460, 470 452, 512 450 C 800 448, 1180 430, 1640 410" stroke="#ff9fd6" stroke-opacity="0.7" stroke-width="1.6"/>
  </g>
  <!-- 分歧点 -->
  <circle cx="512" cy="450" r="26" fill="none" stroke="#dfe8ff" stroke-opacity="0.5" stroke-width="1.4"/>
  <circle cx="512" cy="450" r="6" fill="#dfe8ff" opacity="0.95"/>
  <circle cx="512" cy="450" r="52" fill="none" stroke="#4df0dd" stroke-opacity="0.2" stroke-width="1"/>
  <g fill="#dfe8ff">
    <circle cx="1050" cy="352" r="2.4" opacity="0.85"/>
    <circle cx="1140" cy="520" r="2.4" opacity="0.8"/>
    <circle cx="240" cy="140" r="1.4" opacity="0.6"/><circle cx="1380" cy="120" r="1.5" opacity="0.6"/>
    <circle cx="1500" cy="760" r="1.4" opacity="0.5"/><circle cx="130" cy="780" r="1.3" opacity="0.5"/>
  </g>
</svg>
