<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- 都市夜景：天际线剪影 + 霓虹光晕（原创占位背景） -->
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070f"/>
      <stop offset="0.6" stop-color="#0b1130"/>
      <stop offset="1" stop-color="#141034"/>
    </linearGradient>
    <radialGradient id="haze2" cx="0.5" cy="0.95" r="0.9">
      <stop offset="0" stop-color="#c08bff" stop-opacity="0.28"/>
      <stop offset="0.4" stop-color="#7db5ff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#7db5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky2)"/>
  <rect width="1600" height="900" fill="url(#haze2)"/>
  <g fill="#dfe8ff">
    <circle cx="200" cy="120" r="1.4" opacity="0.7"/><circle cx="480" cy="80" r="1.2" opacity="0.6"/>
    <circle cx="760" cy="160" r="1.6" opacity="0.8"/><circle cx="1120" cy="100" r="1.2" opacity="0.55"/>
    <circle cx="1380" cy="180" r="1.5" opacity="0.7"/><circle cx="920" cy="60" r="1.1" opacity="0.5"/>
  </g>
  <!-- 天际线 -->
  <g fill="#070b18">
    <rect x="0" y="560" width="130" height="340"/>
    <rect x="110" y="470" width="90" height="430"/>
    <rect x="210" y="600" width="140" height="300"/>
    <rect x="360" y="430" width="80" height="470"/>
    <rect x="450" y="540" width="120" height="360"/>
    <rect x="580" y="380" width="70" height="520"/>
    <rect x="660" y="520" width="150" height="380"/>
    <rect x="820" y="450" width="90" height="450"/>
    <rect x="920" y="580" width="130" height="320"/>
    <rect x="1060" y="400" width="80" height="500"/>
    <rect x="1150" y="530" width="120" height="370"/>
    <rect x="1280" y="460" width="90" height="440"/>
    <rect x="1380" y="600" width="120" height="300"/>
    <rect x="1500" y="500" width="100" height="400"/>
  </g>
  <line x1="580" y1="380" x2="580" y2="330" stroke="#ff7d9c" stroke-opacity="0.7" stroke-width="3"/>
  <circle cx="580" cy="326" r="4" fill="#ff7d9c" opacity="0.8"/>
  <line x1="1060" y1="400" x2="1060" y2="356" stroke="#4df0dd" stroke-opacity="0.7" stroke-width="3"/>
  <circle cx="1060" cy="352" r="4" fill="#4df0dd" opacity="0.8"/>
  <!-- 亮灯的窗 -->
  <g opacity="0.85">
    <g fill="#ffd479"><rect x="128" y="500" width="9" height="6"/><rect x="152" y="540" width="9" height="6"/><rect x="376" y="470" width="9" height="6"/><rect x="392" y="520" width="9" height="6"/><rect x="676" y="560" width="9" height="6"/><rect x="716" y="610" width="9" height="6"/><rect x="1078" y="450" width="9" height="6"/><rect x="1298" y="500" width="9" height="6"/><rect x="1518" y="540" width="9" height="6"/></g>
    <g fill="#7db5ff"><rect x="596" y="420" width="9" height="6"/><rect x="612" y="470" width="9" height="6"/><rect x="838" y="490" width="9" height="6"/><rect x="856" y="540" width="9" height="6"/><rect x="1166" y="570" width="9" height="6"/><rect x="1204" y="620" width="9" height="6"/><rect x="236" y="640" width="9" height="6"/><rect x="944" y="620" width="9" height="6"/></g>
    <g fill="#4df0dd"><rect x="470" y="580" width="9" height="6"/><rect x="510" y="630" width="9" height="6"/><rect x="1096" y="520" width="9" height="6"/><rect x="1398" y="640" width="9" height="6"/></g>
  </g>
  <!-- 地面光带 -->
  <rect x="0" y="880" width="1600" height="20" fill="#c08bff" opacity="0.18"/>
</svg>
